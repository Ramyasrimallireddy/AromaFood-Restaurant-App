<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <title>Foodies Nest - Order Food Online</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .welcome-container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-container h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #fc8019 0%, #fc8019 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .welcome-container p {
            color: #9c9c9c;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .welcome-container a {
            display: inline-block;
            padding: 16px 40px;
            margin: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .welcome-container a:first-of-type {
            background: linear-gradient(135deg, #fc8019 0%, #e67e14 100%);
            color: white;
        }

        .welcome-container a:first-of-type:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(252, 128, 25, 0.4);
        }

        .welcome-container a:last-of-type {
            background: white;
            color: #fc8019;
            border: 2px solid #fc8019;
        }

        .welcome-container a:last-of-type:hover {
            background: #fc8019;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(252, 128, 25, 0.3);
        }

        .welcome-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-icon">🍽️</div>
        <h1>Foodies Nest</h1>
        <p>Order delicious food from your favorite restaurants</p>
        <a href="open_signup">Create Account</a>
        <a href="open_signin">Sign In</a>
    </div>
</body>
</html>
