<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <title>Update Menu - Foodies Nest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f1f6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1c1c1c;
        }
        
        .items-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            margin-bottom: 40px;
        }
        
        .items-header {
            background: linear-gradient(135deg, #fc8019 0%, #e67e14 100%);
            color: white;
            padding: 16px;
            font-weight: 700;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 20px;
        }
        
        .menu-item-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 12px;
            border: 2px solid #e8e8e8;
            transition: all 0.3s ease;
        }
        
        .menu-item-card:hover {
            border-color: #fc8019;
            box-shadow: 0 4px 12px rgba(252, 128, 25, 0.1);
        }
        
        .item-name {
            font-weight: 700;
            color: #1c1c1c;
            margin-bottom: 4px;
        }
        
        .item-desc {
            font-size: 12px;
            color: #9c9c9c;
            margin-bottom: 8px;
        }
        
        .item-price {
            color: #fc8019;
            font-weight: 700;
            font-size: 14px;
        }
        
        .add-form-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            padding: 40px;
        }
        
        .form-title {
            font-size: 22px;
            font-weight: 700;
            color: #1c1c1c;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .form-row.full {
            grid-template-columns: 1fr;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #1c1c1c;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="url"]:focus,
        textarea:focus {
            outline: none;
            border-color: #fc8019;
            background: white;
            box-shadow: 0 0 0 4px rgba(252, 128, 25, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        button {
            width: 100%;
            background: linear-gradient(135deg, #fc8019 0%, #e67e14 100%);
            color: white;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(252, 128, 25, 0.2);
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 128, 25, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍽️ Update Menu</h1>
        </div>
        
        {% if itemList %}
        <div class="items-section">
            <div class="items-header">Current Menu Items</div>
            <div class="items-grid">
                {% for item in itemList %}
                <div class="menu-item-card">
                    <div class="item-name">{{ item.name }}</div>
                    <div class="item-desc">{{ item.description }}</div>
                    <div class="item-price">₹{{ item.price }} {% if item.vegeterian %}<span style="color: #48c479;">🥬</span>{% else %}<span style="color: #e63946;">🍗</span>{% endif %}</div>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endif %}
        
        <div class="add-form-section">
            <div class="form-title">➕ Add New Menu Item</div>
            <form action="{% url 'update_menu' restaurant.id %}" method="post">
                {% csrf_token %}
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Item Name:</label>
                        <input type="text" id="name" name="name" placeholder="Enter item name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="price">Price (₹):</label>
                        <input type="number" id="price" name="price" step="0.01" placeholder="Enter price" required>
                    </div>
                </div>
                
                <div class="form-row full">
                    <div class="form-group">
                        <label for="description">Description:</label>
                        <textarea id="description" name="description" placeholder="Enter item description" required></textarea>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="picture">Image URL:</label>
                        <input type="url" id="picture" name="picture" placeholder="Enter image URL">
                    </div>
                    
                    <div class="form-group">
                        <label class="checkbox-group">
                            <input type="checkbox" id="vegeterian" name="vegeterian">
                            <span>🥬 Vegetarian</span>
                        </label>
                    </div>
                </div>
                
                <button type="submit">✓ Add Item</button>
            </form>
        </div>
    </div>
</body>
</html>
