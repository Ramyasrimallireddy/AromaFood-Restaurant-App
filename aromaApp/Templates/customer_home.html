<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <title>Restaurants - Foodies Nest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f1f6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px 0;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        
        .header h3 {
            font-size: 24px;
            color: #1c1c1c;
            font-weight: 700;
        }
        
        .cart-btn {
            background: linear-gradient(135deg, #fc8019 0%, #e67e14 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(252, 128, 25, 0.2);
        }
        
        .cart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(252, 128, 25, 0.3);
        }
        
        .restaurants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .restaurant-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .restaurant-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        
        .restaurant-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .restaurant-card:hover .restaurant-image {
            transform: scale(1.05);
        }
        
        .restaurant-info {
            padding: 16px;
        }
        
        .restaurant-name {
            font-size: 18px;
            font-weight: 700;
            color: #1c1c1c;
            margin-bottom: 8px;
        }
        
        .restaurant-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .cuisine {
            color: #9c9c9c;
        }
        
        .rating {
            background: #48c479;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
        }
        
        .view-btn {
            width: 100%;
            background: linear-gradient(135deg, #fc8019 0%, #e67e14 100%);
            color: white;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(252, 128, 25, 0.15);
        }
        
        .view-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(252, 128, 25, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-content">
                <h3>🍽️ Welcome {{ username }}!</h3>
                <a href="{% url 'show_cart' username %}" class="cart-btn">🛒 My Cart</a>
            </div>
        </div>
        
        <div class="restaurants-grid">
            {% for r in restuarants %}
            <div class="restaurant-card">
                <img src="{{ r.picture }}" alt="{{ r.restuarant_name }}" class="restaurant-image">
                <div class="restaurant-info">
                    <div class="restaurant-name">{{ r.restuarant_name }}</div>
                    <div class="restaurant-meta">
                        <span class="cuisine">{{ r.cuisine }}</span>
                        <span class="rating">⭐ {{ r.rating }}</span>
                    </div>
                    <!-- <button class="view-btn" onclick="window.location.href='{% url 'view_menu' r.id username %}'">View Menu</button> -->
                     <a href="{% url 'view_menu' r.id username %}" class="view-btn" style="text-decoration: none; color: white;">View Menu</a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
