<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <title>Update Restaurant - Foodies Nest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .form-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.6s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1c1c1c;
            margin-bottom: 5px;
        }
        
        .form-header p {
            color: #9c9c9c;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            color: #1c1c1c;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="number"],
        input[type="url"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="number"]:focus,
        input[type="url"]:focus,
        textarea:focus {
            outline: none;
            border-color: #fc8019;
            background: white;
            box-shadow: 0 0 0 4px rgba(252, 128, 25, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        
        button,
        .cancel-btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        button {
            background: linear-gradient(135deg, #fc8019 0%, #e67e14 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(252, 128, 25, 0.2);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 128, 25, 0.3);
        }
        
        .cancel-btn {
            background: #e8e8e8;
            color: #1c1c1c;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cancel-btn:hover {
            background: #d0d0d0;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>✎ Update Restaurant</h1>
            <p>Edit restaurant details</p>
        </div>
        
        <form action="{% url 'update_restuarant' restuarant.id %}" method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="name">Restaurant Name:</label>
                <input type="text" id="name" name="name" value="{{ restuarant.restuarant_name }}" required>
            </div>
            
            <div class="form-group">
                <label for="picture">Picture URL:</label>
                <input type="text" id="picture" name="picture" value="{{ restuarant.picture }}" required>
            </div>
            
            <div class="form-group">
                <label for="cuisine">Cuisine:</label>
                <input type="text" id="cuisine" name="cuisine" value="{{ restuarant.cuisine }}" required>
            </div>
            
            <div class="form-group">
                <label for="rating">Rating:</label>
                <input type="number" id="rating" name="rating" min="0" max="5" step="0.5" value="{{ restuarant.rating }}" required>
            </div>
            
            <div class="button-group">
                <button type="submit">✓ Update Restaurant</button>
            </div>
        </form>
    </div>
</body>
</html>
