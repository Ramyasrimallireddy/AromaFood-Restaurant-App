<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <title>Menu - Foodies Nest</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f1f1f6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }
        
        .header h3 {
            font-size: 22px;
            font-weight: 700;
            color: #1c1c1c;
        }
        
        .back-link {
            background: linear-gradient(135deg, #fc8019 0%, #e67e14 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            transform: translateY(-2px);
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .menu-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }
        
        .menu-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }
        
        .item-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .menu-item:hover .item-image {
            transform: scale(1.05);
        }
        
        .item-content {
            padding: 16px;
        }
        
        .item-name {
            font-size: 18px;
            font-weight: 700;
            color: #1c1c1c;
            margin-bottom: 8px;
        }
        
        .item-desc {
            color: #9c9c9c;
            font-size: 14px;
            margin-bottom: 12px;
            height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .item-price {
            font-size: 20px;
            font-weight: 700;
            color: #1c1c1c;
        }
        
        .item-veg {
            background: #48c479;
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .item-veg.non-veg {
            background: #e63946;
        }
        
        .add-btn {
            width: 100%;
            background: linear-gradient(135deg, #fc8019 0%, #e67e14 100%);
            color: white;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(252, 128, 25, 0.15);
        }
        
        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(252, 128, 25, 0.25);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h3>🍜 Menu Items</h3>
            <a href="{% url 'show_cart' username %}" class="back-link">🛒 View Cart</a>
        </div>
        
        <div class="menu-grid">
            {% for item in itemList %}
            <div class="menu-item">
                <img src="{{ item.picture }}" alt="{{ item.name }}" class="item-image">
                <div class="item-content">
                    <div class="item-name">{{ item.name }}</div>
                    <div class="item-desc">{{ item.description }}</div>
                    <div class="item-footer">
                        <div class="item-price">₹{{ item.price }}</div>
                        <span class="item-veg {% if not item.vegeterian %}non-veg{% endif %}">
                            {% if item.vegeterian %}🥬 Veg{% else %}🍗 Non-Veg{% endif %}
                        </span>
                    </div>
                    <a href="{% url 'add_to_cart' item.id username %}" style="text-decoration: none;">
                        <button class="add-btn">Add to Cart</button>
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
